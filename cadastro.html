<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilo.css">
    <title>AgroVerde • Cadastro</title>
</head>
<body style="background: linear-gradient(#F1F8E9, #E8F5E9);">

    <div class="login-container" style="max-width:480px;">
        <div style="text-align:center; margin-bottom:1rem;">
            <span style="font-size:2.8rem;">🌿</span>
            <h1 style="margin:0.2rem 0;">AgroVerde</h1>
        </div>

        <h2 style="text-align:center;">Crie sua conta</h2>
        <p style="text-align:center; color:#64748B;">Comece a gerenciar sua agropecuária hoje</p>

        <form id="cadastroForm">
            <label>Nome Completo / Nome da Fazenda</label>
            <input type="text" placeholder="Ex: Fazenda São João" required>

            <label>E-mail</label>
            <input type="email" placeholder="seu@email.com" required>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div>
                    <label>CPF/CNPJ</label>
                    <input type="text" placeholder="000.000.000-00" required>
                </div>
                <div>
                    <label>Telefone</label>
                    <input type="tel" placeholder="(45) 99999-0000" required>
                </div>
            </div>

            <label>Senha</label>
            <input type="password" placeholder="Crie uma senha forte" required>

            <label>Confirmar Senha</label>
            <input type="password" placeholder="Repita a senha" required>

            <button type="submit" style="width:100%; margin-top:1rem; background:#2E7D32;">Criar Conta Gratuita</button>
        </form>

        <p style="text-align:center; margin-top:1.5rem;">
            Já tem uma conta? <a href="login.html" style="color:#2E7D32; font-weight:600;">Fazer login</a>
        </p>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Cadastro realizado com sucesso! (Demo)\nVocê já pode fazer login.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
